{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap">

    <link rel="stylesheet" href="{% static 'admin.css' %}">
</head>

<body>

<div class="admin-layout">

    <!-- ===== Sidebar ===== -->
    <aside class="admin-sidebar">
        <div class="admin-brand">PetJoy Admin</div>

        <nav class="admin-menu">

            <a href="{% url 'petjoy:admin-dashboard' %}"
               class="{% block nav_dashboard %}{% endblock %}">
                📊 Dashboard
            </a>

            <a href="{% url 'petjoy:admin-users' %}"
               class="{% block nav_users %}{% endblock %}">
                👥 จัดการผู้ใช้งาน
            </a>

            <a href="{% url 'petjoy:admin-shop-list' %}"
               class="{% block nav_shops %}{% endblock %}">
                🏪 อนุมัติร้านค้า
            </a>

            <a href="{% url 'petjoy:admin-chat-list' %}" 
               class="{% block nav_chat %}{% endblock %}">
                💬 ข้อความ
            </a>

            <a href="{% url 'petjoy:admin-orders-analytics' %}"
               class="{% block nav_orders %}{% endblock %}">
                📦 รายได้
            </a>

            <a href="{% url 'petjoy:admin-report-list' %}"
               class="{% block nav_reports %}{% endblock %}">
                🚨 การรายงาน
            </a>

            <a href="{% url 'petjoy:admin-category-settings' %}"
               class="{% block nav_settings %}{% endblock %}">
                ⚙️ การตั้งค่า
            </a>

        </nav>

        <div class="admin-logout">
            <form method="post" action="{% url 'petjoy:logout' %}">
                {% csrf_token %}
                <button type="submit">🚪 ออกจากระบบ</button>
            </form>
        </div>

    </aside>

    <!-- ===== Main ===== -->
    <main class="admin-main">

        <div class="admin-header">
            <h1>{% block page_title %}{% endblock %}</h1>
            <div class="admin-user">
                {{ request.user.username }}
            </div>
        </div>

        {% block content %}{% endblock %}

    </main>

</div>

</body>
</html>
